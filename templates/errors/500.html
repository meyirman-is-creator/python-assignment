{% extends 'base.html' %}
{% load static %}

{% block title %}Ошибка сервера - Lost and Found{% endblock %}

{% block content %}
<div class="error-container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="card">
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="error-content p-4">
                        <h1 class="error-title" style="font-size: 5rem; color: var(--danger-color);">500</h1>
                        <h2 class="error-subtitle mb-3">Ошибка сервера</h2>
                        <p class="error-description mb-4">На сервере произошла ошибка. Мы уже работаем над её устранением.</p>
                        <div class="error-actions">
                            <a href="{% url 'home' %}" class="btn btn-primary">На главную</a>
                            <a href="javascript:history.back()" class="btn btn-outline-secondary ml-2">Вернуться назад</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="error-image p-4 text-center">
                        <img src="{% static 'img/500.svg' %}" alt="500 Error" class="error-img img-fluid" style="max-height: 300px;">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
